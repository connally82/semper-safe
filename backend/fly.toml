# fly.toml — Semper Safe backend
#
# Generated stub. Adjust if `fly launch` rewrites it; the values here are
# the ones we'd pick in the interactive prompts:
#   - app name: semper-safe (already exists per Fly API)
#   - region:   dfw (Dallas — closest to the Texas AOI)
#   - port:     8000 internal, 80/443 public via Fly's edge
#   - VM:       smallest shared-cpu (free tier covers this)
#
# Deploy with:
#   cd backend
#   fly deploy --remote-only
#
# `--remote-only` uses Fly's builders so you don't need Docker locally.

app = "semper-safe"
primary_region = "dfw"

# The Dockerfile in this directory is the build context.
[build]

[env]
  # Container PORT is read by the Dockerfile CMD.
  PORT = "8000"

# Run Alembic migrations once before machines roll. Idempotent — if
# the DB is already at head, this is a no-op. DATABASE_URL is read from
# the secret set via `flyctl secrets set DATABASE_URL=...`.
[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  # Phase 2: machine must stay alive so the AISStream WebSocket stays
  # connected. min_machines_running = 1 keeps one always up; one
  # shared-cpu-1x is well within Fly's hobby allowance.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # 180s grace covers the cold-start case where DB is empty and the
  # seed scenario writes ~1,800 audit entries to Neon (each is a
  # network round trip). Subsequent restarts skip the seed and boot
  # in under 5 seconds.
  [[http_service.checks]]
    grace_period = "180s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  # 256mb → 512mb after observations dict OOM (see git log).
  # 512mb → 1024mb (Phase 4.3): rasterio/GDAL + 4096^2 float32 CFAR tile
  # arrays + the live AIS engine state would not coexist under 1 GB.
  # 1024mb → 2048mb (Phase 4.x): even at TILE_PX=1024 the SAR auto-process
  # loop OOMs on a 1 GB VM once the in-memory engine grows past ~700 entities
  # and ~7000 recommendations. CFAR on a 1024² VV+VH+integral-image set
  # costs ~225 MB while live AIS + bootstrap state already occupies ~700 MB.
  # 2 GB gives clean headroom and lets us re-enable SAR_AUTO_PROCESS.
  # See task #23 in the project tasks for the original incident.
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
