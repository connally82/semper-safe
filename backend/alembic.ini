# Alembic config — minimal. Most settings are derived from env.py at runtime.
# Run from backend/:
#   alembic revision --autogenerate -m "..."
#   alembic upgrade head

[alembic]
script_location = migrations
prepend_sys_path = .
timezone = UTC
truncate_slug_length = 40
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
version_path_separator = os
sqlalchemy.url = driver://user:pass@host/dbname  # ignored — env.py reads DATABASE_URL

[post_write_hooks]
# (none for now — could add ruff/black formatting hooks later)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
